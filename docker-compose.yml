version: "3.8"

# Microservices Architecture for Dataverse
# Services are isolated in separate networks with API Gateway as single entry point

services:
  # ===========================================
  # API Gateway Layer (Entry Point)
  # ===========================================
  api-gateway:
    container_name: "dataverse_api_gateway"
    hostname: api-gateway
    image: nginx:${NGINX_VERSION:-alpine}
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
      - "${API_GATEWAY_HTTPS_PORT:-443}:443"
    networks:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      dataverse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "com.dataverse.service=api-gateway"
      - "com.dataverse.tier=frontend"
      - "com.dataverse.description=API Gateway and Load Balancer"

  # ===========================================
  # Application Layer (Business Logic)
  # ===========================================
  # ===========================================
  # Data Layer (Persistence Services)
  # ===========================================
  postgres:
    container_name: "dataverse_postgres"
    hostname: postgres
    image: postgres:${POSTGRES_VERSION:-16}
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATAVERSE_DB_USER:-dataverse}
      - POSTGRES_PASSWORD=${DATAVERSE_DB_PASSWORD:-secret}
      - POSTGRES_DB=dataverse
    # Only expose to backend network, not directly accessible from outside
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATAVERSE_DB_USER:-dataverse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.dataverse.service=postgres"
      - "com.dataverse.tier=data"
      - "com.dataverse.description=PostgreSQL Database Service"

  # ===========================================
  # Search Layer (Search Services)
  # ===========================================
  solr_initializer:
    container_name: "dataverse_solr_initializer"
    image: gdcc/configbaker:${CONFIGBAKER_VERSION:-latest}
    restart: "no"
    command:
      - sh
      - -c
      - "fix-fs-perms.sh solr && cp -a /template/* /solr-template"
    volumes:
      - solr-data:/var/solr
      - solr-conf:/solr-template
    networks:
      - backend
    labels:
      - "com.dataverse.service=solr-initializer"
      - "com.dataverse.tier=initialization"
      - "com.dataverse.description=Solr Initialization Service"

  solr:
    container_name: "dataverse_solr"
    hostname: solr
    image: solr:${SOLR_VERSION:-9.6.1}
    depends_on:
      solr_initializer:
        condition: service_completed_successfully
    restart: unless-stopped
    # Only accessible from backend network
    networks:
      - backend
    environment:
      - SOLR_OPTS=-Dsolr.jetty.request.header.size=102400
    command:
      - "solr-precreate"
      - "collection1"
      - "/template"
    volumes:
      - solr-data:/var/solr
      - solr-conf:/template
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8983/solr/collection1/admin/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      - "com.dataverse.service=solr"
      - "com.dataverse.tier=search"
      - "com.dataverse.description=Apache Solr Search Service"

  # ===========================================
  # Communication Layer (Messaging Services)
  # ===========================================
  smtp:
    container_name: "dataverse_smtp"
    hostname: smtp
    image: maildev/maildev:${MAILDEV_VERSION:-2.1.0}
    restart: unless-stopped
    ports:
      - "${MAILDEV_WEB_PORT:-1080}:1080"  # Web UI for viewing emails
    environment:
      - MAILDEV_SMTP_PORT=25
      - MAILDEV_MAIL_DIRECTORY=/mail
    networks:
      - backend
      - frontend  # For web UI access
    tmpfs:
      - /mail:mode=770,size=128M
    labels:
      - "com.dataverse.service=smtp"
      - "com.dataverse.tier=communication"
      - "com.dataverse.description=Email Service with Web UI"

  # ===========================================
  # Initialization Services
  # ===========================================
  dv_initializer:
    container_name: "dataverse_initializer"
    image: gdcc/configbaker:${CONFIGBAKER_VERSION:-latest}
    restart: "no"
    command:
      - sh
      - -c
      - "fix-fs-perms.sh dv"
    volumes:
      - dataverse-data:/dv
    networks:
      - backend
    labels:
      - "com.dataverse.service=dv-initializer"
      - "com.dataverse.tier=initialization"
      - "com.dataverse.description=Dataverse Initialization Service"

  # ===========================================
  # Application Layer (Core Services)
  # ===========================================
  dataverse:
    container_name: "dataverse"
    hostname: dataverse
    image: gdcc/dataverse:${DATAVERSE_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      solr:
        condition: service_healthy
      dv_initializer:
        condition: service_completed_successfully
    restart: unless-stopped
    user: payara
    environment:
      # Database Configuration
      DATAVERSE_DB_HOST: postgres
      DATAVERSE_DB_PORT: 5432
      DATAVERSE_DB_USER: ${DATAVERSE_DB_USER:-dataverse}
      DATAVERSE_DB_PASSWORD: ${DATAVERSE_DB_PASSWORD:-secret}
      
      # Mail Configuration
      DATAVERSE_MAIL_SYSTEM_EMAIL: ${DATAVERSE_MAIL_SYSTEM_EMAIL:-dataverse@localhost}
      DATAVERSE_MAIL_MTA_HOST: smtp
      DATAVERSE_MAIL_MTA_PORT: 25
      
      # File Storage Configuration
      JVM_ARGS: >-
        -Ddataverse.files.storage-driver-id=file1
        -Ddataverse.files.file1.type=file
        -Ddataverse.files.file1.label=Filesystem
        -Ddataverse.files.file1.directory=/dv/store
        -Ddataverse.pid.providers=perma
        -Ddataverse.pid.default-provider=perma
        -Ddataverse.pid.perma.type=PERMA
        -Ddataverse.pid.perma.label=PermaLink
        -Ddataverse.pid.perma.permalink-base-url=${DATAVERSE_URL:-http://localhost:8080}
      
      # Feature Flags
      DATAVERSE_FEATURE_API_BEARER_AUTH: ${DATAVERSE_FEATURE_API_BEARER_AUTH:-1}
      
      # Solr Configuration
      DATAVERSE_SOLR_HOST: solr
      DATAVERSE_SOLR_PORT: 8983
      
    # Only expose internally - API Gateway handles external access
    networks:
      - backend
      - frontend  # For direct admin access if needed
    volumes:
      - dataverse-data:/dv
      - dataverse-secrets:/secrets
    tmpfs:
      - /dumps:mode=770,size=2052M
      - /tmp:mode=770,size=2052M
    mem_limit: 2147483648  # 2 GiB
    mem_reservation: 1024m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/info/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      - "com.dataverse.service=dataverse"
      - "com.dataverse.tier=application"
      - "com.dataverse.description=Dataverse Core Application Service"

  bootstrap:
    container_name: "dataverse_bootstrap"
    image: gdcc/configbaker:${CONFIGBAKER_VERSION:-latest}
    depends_on:
      dataverse:
        condition: service_healthy
    restart: "no"
    environment:
      - TIMEOUT=${BOOTSTRAP_TIMEOUT:-10m}
    command:
      - bootstrap.sh
      - ${BOOTSTRAP_MODE:-dev}
    networks:
      - backend
    volumes:
      - solr-data:/var/solr
      - ./demo:/scripts/bootstrap/demo
    labels:
      - "com.dataverse.service=bootstrap"
      - "com.dataverse.tier=initialization"
      - "com.dataverse.description=Bootstrap Configuration Service"

  # ===========================================
  # Presentation Layer (File Services)
  # ===========================================
  previewers-provider:
    container_name: "dataverse_previewers_provider"
    hostname: previewers-provider
    image: trivadis/dataverse-previewers-provider:${PREVIEWERS_VERSION:-latest}
    restart: unless-stopped
    networks:
      - backend
      - frontend  # For external previewer access
    environment:
      - NGINX_HTTP_PORT=9080
      - PREVIEWERS_PROVIDER_URL=http://localhost:9080
      - VERSIONS="v1.4,betatest"
    labels:
      - "com.dataverse.service=previewers"
      - "com.dataverse.tier=presentation"
      - "com.dataverse.description=File Preview Service"

  register-previewers:
    container_name: "dataverse_register_previewers"
    hostname: register-previewers
    image: trivadis/dataverse-deploy-previewers:${PREVIEWERS_VERSION:-latest}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - backend
    environment:
      - DATAVERSE_URL=http://dataverse:8080
      - TIMEOUT=10m
      - PREVIEWERS_PROVIDER_URL=http://previewers-provider:9080
      # Uncomment to specify which previewers you want
      # - INCLUDE_PREVIEWERS=text,html,pdf,csv,comma-separated-values,tsv,tab-separated-values,jpeg,png,gif,markdown,x-markdown
      - EXCLUDE_PREVIEWERS=
      - REMOVE_EXISTING=true
    command:
      - deploy
    restart: "no"
    labels:
      - "com.dataverse.service=register-previewers"
      - "com.dataverse.tier=initialization"
      - "com.dataverse.description=Previewer Registration Service"

# ===========================================
# Network Configuration (Microservices Isolation)
# ===========================================
networks:
  # Frontend network - for services that need external access
  frontend:
    driver: bridge
    name: dataverse-frontend-network
    labels:
      - "com.dataverse.network=frontend"
      - "com.dataverse.description=Frontend network for external-facing services"
  
  # Backend network - for internal service communication only
  backend:
    driver: bridge
    name: dataverse-backend-network
    internal: false  # Set to true for stricter isolation (blocks external internet)
    labels:
      - "com.dataverse.network=backend"
      - "com.dataverse.description=Backend network for internal microservices"

volumes:
  postgres-data:
    name: dataverse-postgres-data
  solr-data:
    name: dataverse-solr-data
  solr-conf:
    name: dataverse-solr-conf
  dataverse-data:
    name: dataverse-data
  dataverse-secrets:
    name: dataverse-secrets
