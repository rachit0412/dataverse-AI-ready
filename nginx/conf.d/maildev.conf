# MailDev Email Testing UI Route
# Accessible at /maildev/

server {
    listen 80;
    server_name localhost;

    # MailDev web interface
    location /maildev/ {
        proxy_pass http://maildev_ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for live email updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Remove /maildev prefix before passing to upstream
        rewrite ^/maildev/(.*) /$1 break;
    }
}
