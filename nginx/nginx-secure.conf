# ============================================================================
# Security-Hardened Nginx Configuration
# ============================================================================
# Implements enterprise security best practices:
# - Rate limiting
# - DDoS protection
# - Security headers
# - Request filtering
# - Connection limits
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Security: Limit number of file descriptors
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
    
    # Security: Prevent connection exhaustion
    accept_mutex on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================================================
    # SECURITY: Rate Limiting Zones
    # ============================================================================
    
    # API rate limiting: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Login rate limiting: 5 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    
    # General rate limiting: 100 requests per second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    
    # Connection limiting: 10 connections per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # Request body size limiting
    limit_req_status 429;
    limit_conn_status 429;

    # ============================================================================
    # SECURITY: Logging Configuration
    # ============================================================================
    
    log_format security '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time '
                       'request_id=$request_id limit=$limit_req_status';

    access_log /var/log/nginx/access.log security;
    
    # Security: Log suspicious requests
    map $status $loggable {
        ~^[23]  0;
        default 1;
    }

    # ============================================================================
    # SECURITY: Request Filtering
    # ============================================================================
    
    # Block requests with no User-Agent
    map $http_user_agent $block_ua {
        default 0;
        "" 1;
        "~*malicious" 1;
        "~*bot" 0;
        "~*spider" 0;
        "~*crawler" 0;
    }
    
    # Block based on suspicious patterns
    map $request_method $block_method {
        default 0;
        "TRACE" 1;
        "TRACK" 1;
    }

    # ============================================================================
    # Performance & Security
    # ============================================================================
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;  # Reduced for security
    keepalive_requests 100;
    types_hash_max_size 2048;
    
    # Security: Hide nginx version
    server_tokens off;
    
    # Security: Limit buffer sizes to prevent buffer overflow attacks
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    client_max_body_size 2G;
    large_client_header_buffers 4 16k;
    
    # Security: Timeout settings to prevent slowloris attacks
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # Security: Proxy settings
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_temp_file_write_size 8k;
    
    # Gzip compression (with security considerations)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ============================================================================
    # SECURITY: SSL/TLS Configuration (when enabled)
    # ============================================================================
    
    # SSL session settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # SSL protocols and ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================================================
    # Upstream Definitions with Health Checks
    # ============================================================================
    
    upstream dataverse_app {
        server dataverse:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    upstream maildev_ui {
        server smtp:1080 max_fails=2 fail_timeout=30s;
        keepalive 16;
    }

    upstream previewers {
        server previewers-provider:9080 max_fails=2 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================================================
    # Default Server Block - Deny All (Security)
    # ============================================================================
    
    server {
        listen 80 default_server;
        server_name _;
        
        # Security: Return 444 (connection closed) for undefined hosts
        return 444;
    }

    # ============================================================================
    # Health Check Endpoint (Internal Only)
    # ============================================================================
    
    server {
        listen 80;
        server_name localhost 127.0.0.1;
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            add_header X-Health-Check "OK";
        }
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }

    # ============================================================================
    # Include Server Configurations
    # ============================================================================
    
    include /etc/nginx/conf.d/*.conf;
}
